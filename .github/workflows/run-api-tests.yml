name: Run API tests

on:
  repository_dispatch:
    types: [run-api-tests]
  workflow_dispatch:
    inputs:
      branch:
        description: "Backend image tag"
        required: false
        default: "main"

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event.client_payload.branch || 'main' }}
      ENV: ci

    steps:
      - name: Checkout tests repo
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install test dependencies
        run: uv sync

      - name: Start QA environment
        run: make up

      - name: Show container logs
        if: failure()
        run: docker compose -f docker-compose.yml logs

      - name: Run pytest
        run: uv run pytest -v

      - name: Stop QA environment
        if: always()
        run: make down -v
