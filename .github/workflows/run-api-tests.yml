name: Run API tests

on:
  repository_dispatch:
    types: [run-api-tests]
  workflow_dispatch:
    inputs:
      branch:
        description: "Backend image tag"
        required: false
        default: "main"

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event.client_payload.branch || github.event.inputs.branch || 'main' }}
      ENV: ci

    steps:
      - name: Checkout tests repo
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install test dependencies
        run: uv sync

      - name: Start QA environment
        run: make up

      - name: Install Allure
        run: npm install -g allure-commandline

      - name: Show container logs
        if: failure()
        run: make logs

      - name: Run pytest
        run: uv run pytest -v

      - name: Generate Allure report
        if: always()
        run: make allure-report

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

      - name: Stop QA environment
        if: always()
        run: make down
